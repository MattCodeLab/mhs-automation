<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BNM MHS Data Browser</title>
<style>
  /* ── reset + base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --card:    #21253a;
    --border:  #2e3250;
    --accent:  #4f8ef7;
    --accent2: #7c5cbf;
    --text:    #e2e8f0;
    --muted:   #8892a8;
    --green:   #4ade80;
    --yellow:  #fbbf24;
    --red:     #f87171;
    --font:    'Inter', system-ui, sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font);
         font-size: 14px; line-height: 1.5; height: 100vh; overflow: hidden; }

  /* ── layout ── */
  #app { display: grid; grid-template-columns: 340px 1fr; height: 100vh; }

  /* ── sidebar ── */
  #sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  #sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #sidebar-header h1 { font-size: 16px; font-weight: 600; color: var(--text); }
  #sidebar-header p  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  #search { width: 100%; padding: 8px 10px; background: var(--card); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-size: 13px; margin-top: 10px; outline: none; }
  #search:focus { border-color: var(--accent); }
  #domain-filter { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .domain-chip { padding: 2px 8px; border-radius: 20px; font-size: 11px; cursor: pointer;
                 background: var(--card); border: 1px solid var(--border); color: var(--muted);
                 transition: all .15s; }
  .domain-chip.active, .domain-chip:hover { background: var(--accent); border-color: var(--accent);
                                            color: #fff; }
  #table-list { overflow-y: auto; flex: 1; }
  .table-item { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer;
                transition: background .1s; }
  .table-item:hover  { background: var(--card); }
  .table-item.active { background: var(--card); border-left: 3px solid var(--accent); padding-left: 11px; }
  .ti-id    { font-size: 11px; color: var(--accent); font-weight: 600; }
  .ti-title { font-size: 13px; color: var(--text); margin-top: 1px; white-space: nowrap;
              overflow: hidden; text-overflow: ellipsis; }
  .ti-meta  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ti-err   { color: var(--red); }
  #list-count { padding: 8px 14px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); }

  /* ── main panel ── */
  #main { display: flex; flex-direction: column; overflow: hidden; }
  #main-header { padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #main-header h2 { font-size: 18px; font-weight: 600; }
  #main-header .subtitle { font-size: 12px; color: var(--muted); margin-top: 4px; }
  #main-body { flex: 1; overflow-y: auto; padding: 16px 20px; }

  /* ── stat cards ── */
  .stat-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
               padding: 12px 16px; flex: 1; min-width: 120px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .stat-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .stat-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .pill { display: inline-block; padding: 1px 7px; border-radius: 12px; font-size: 11px; font-weight: 600;
          margin: 2px; }
  .pill-blue   { background: #1e3a5f; color: var(--accent); }
  .pill-purple { background: #2d1f4f; color: #a78bfa; }
  .pill-green  { background: #14322b; color: var(--green); }
  .pill-yellow { background: #3b2a10; color: var(--yellow); }

  /* ── chart ── */
  #chart-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
                padding: 16px; margin-bottom: 16px; }
  #chart-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  #freq-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
  .freq-tab { padding: 3px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
              background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .freq-tab.active, .freq-tab:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  #type-selector { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; align-items: center; }
  #type-selector-label { font-size: 10px; color: var(--muted); text-transform: uppercase;
                          letter-spacing: .06em; margin-right: 2px; }
  .type-btn { padding: 2px 9px; border-radius: 4px; font-size: 11px; cursor: pointer;
              background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-weight: 600; }
  .type-btn.active { color: #fff; }
  .type-btn[data-type="all"].active  { background: var(--surface); border-color: var(--accent); color: var(--accent); }
  .type-btn[data-type="rm"].active   { background: #14322b; border-color: var(--green); color: var(--green); }
  .type-btn[data-type="pct"].active  { background: #3b2a10; border-color: var(--yellow); color: var(--yellow); }
  .type-btn[data-type="volume"].active { background: #2d1f4f; border-color: #a78bfa; color: #a78bfa; }
  .type-btn[data-type="other"].active  { background: #1e3a5f; border-color: var(--accent); color: var(--accent); }
  #col-selector { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .col-btn { padding: 3px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
             background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .col-btn.active { border-color: var(--accent); color: var(--accent); background: #1e3a5f; }
  canvas#chart { width: 100% !important; height: 240px !important; }

  /* ── columns table ── */
  .section-title { font-size: 13px; font-weight: 600; margin: 16px 0 8px; color: var(--muted);
                   text-transform: uppercase; letter-spacing: .06em; }
  table.cols { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.cols th { text-align: left; padding: 6px 8px; background: var(--card);
                  border-bottom: 2px solid var(--border); color: var(--muted); font-weight: 600; }
  table.cols td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  table.cols tr:hover td { background: var(--card); }
  .mono { font-family: 'Fira Code', 'Consolas', monospace; }
  .null-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 4px; }
  .null-fill { height: 100%; background: var(--green); border-radius: 3px; }

  /* ── sample data ── */
  .sample-scroll { overflow-x: auto; }
  table.sample { min-width: 600px; border-collapse: collapse; font-size: 11px; }
  table.sample th { background: var(--card); padding: 5px 8px; border-bottom: 1px solid var(--border);
                    color: var(--muted); white-space: nowrap; font-weight: 600; }
  table.sample td { padding: 5px 8px; border-bottom: 1px solid var(--border); white-space: nowrap;
                    font-family: 'Fira Code', monospace; }

  /* ── empty / loading states ── */
  .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center;
                 height: 100%; color: var(--muted); gap: 12px; }
  .placeholder svg { opacity: .3; }
  #loading { position: fixed; top: 0; left: 0; right: 0; height: 3px;
             background: linear-gradient(90deg, var(--accent), var(--accent2));
             transform-origin: left; animation: load .6s ease-in-out infinite alternate; }
  @keyframes load { from { transform: scaleX(.1); } to { transform: scaleX(1); } }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="loading" class="hidden"></div>
<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>BNM Monthly Highlights</h1>
      <p id="db-summary">Loading…</p>
      <input id="search" placeholder="Search tables…" autocomplete="off">
      <div id="domain-filter"></div>
    </div>
    <div id="list-count"></div>
    <div id="table-list"></div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="main-header">
      <h2 id="tbl-name">Select a table</h2>
      <div class="subtitle" id="tbl-subtitle"></div>
    </div>
    <div id="main-body">
      <div class="placeholder" id="welcome">
        <svg width="64" height="64" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M4 7h16M4 12h16M4 17h7"/>
        </svg>
        <span>Choose a table from the sidebar</span>
      </div>
      <div id="detail" class="hidden">
        <div class="stat-row" id="stat-row"></div>
        <div id="chart-wrap">
          <div id="chart-title">Time series</div>
          <div id="freq-tabs"></div>
          <div id="type-selector"><span id="type-selector-label">Type</span></div>
          <div id="col-selector"></div>
          <canvas id="chart"></canvas>
        </div>
        <div class="section-title">Columns</div>
        <table class="cols" id="cols-table">
          <thead><tr><th>#</th><th>Column</th><th>Min</th><th>Max</th><th>Non-null</th><th>Fill rate</th></tr></thead>
          <tbody></tbody>
        </table>
        <div class="section-title" style="margin-top:20px">Sample rows (first 5)</div>
        <div class="sample-scroll">
          <table class="sample" id="sample-table"><thead></thead><tbody></tbody></table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Lightweight charting via Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
// ── state ──────────────────────────────────────────────────────────────────
let allTables = [];
let activeTable = null;
let chartInstance = null;
let seriesData = null;          // { cols, rows, col_types, col_labels }
let activeFreq = null;
let activeCols = new Set();
let activeDataType = null;      // null = all types
let domainFilter = null;

const TYPE_LABELS = { rm: "RM", pct: "%", volume: "Volume", other: "Other" };
const TYPE_ORDER  = ["rm", "pct", "volume", "other"];

// ── boot ───────────────────────────────────────────────────────────────────
(async () => {
  const tables = await api("/api/tables");
  allTables = tables;

  const loaded = tables.filter(t => !t.error);
  const total  = loaded.reduce((s, t) => s + t.row_count, 0);
  document.getElementById("db-summary").textContent =
    `${loaded.length} tables · ${total.toLocaleString()} rows`;

  // Domain chips
  const domains = [...new Set(tables.map(t => t.domain))].sort();
  const df = document.getElementById("domain-filter");
  df.innerHTML = domains.map(d =>
    `<span class="domain-chip" data-domain="${d}">${d}</span>`
  ).join("");
  df.addEventListener("click", e => {
    const chip = e.target.closest(".domain-chip");
    if (!chip) return;
    const d = chip.dataset.domain;
    domainFilter = domainFilter === d ? null : d;
    df.querySelectorAll(".domain-chip").forEach(c =>
      c.classList.toggle("active", c.dataset.domain === domainFilter)
    );
    renderList();
  });

  renderList();
})();

document.getElementById("search").addEventListener("input", renderList);

// ── sidebar list ──────────────────────────────────────────────────────────
function renderList() {
  const q   = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("table-list");
  const filtered = allTables.filter(t => {
    if (domainFilter && t.domain !== domainFilter) return false;
    if (!q) return true;
    return t.table_id.includes(q) || t.title.toLowerCase().includes(q) ||
           t.domain.toLowerCase().includes(q);
  });
  document.getElementById("list-count").textContent =
    `${filtered.length} table${filtered.length !== 1 ? "s" : ""}`;

  list.innerHTML = filtered.map(t => {
    const err = t.error ? `<span class="ti-err">⚠ ${t.error}</span>` : "";
    const range = t.date_min ? `${t.date_min.slice(0,7)} – ${t.date_max.slice(0,7)}` : "";
    const freqs = (t.frequencies || []).join(", ");
    return `<div class="table-item${t.table_name === activeTable?.table_name ? " active" : ""}"
                 data-name="${t.table_name}">
      <div class="ti-id">${t.table_id}</div>
      <div class="ti-title">${t.title}</div>
      <div class="ti-meta">${err || `${t.row_count?.toLocaleString()} rows · ${range} · ${freqs}`}</div>
    </div>`;
  }).join("");

  list.querySelectorAll(".table-item").forEach(el => {
    el.addEventListener("click", () => {
      const t = allTables.find(x => x.table_name === el.dataset.name);
      if (t) openTable(t);
    });
  });
}

// ── table detail ──────────────────────────────────────────────────────────
async function openTable(t) {
  activeTable = t;
  renderList();   // update active highlight

  document.getElementById("welcome").classList.add("hidden");
  document.getElementById("detail").classList.add("hidden");
  document.getElementById("tbl-name").textContent = `${t.table_id} — ${t.title}`;
  document.getElementById("tbl-subtitle").textContent =
    `${t.domain} · ${t.row_count?.toLocaleString() || 0} rows`;

  loading(true);
  const detail = await api(`/api/table/${encodeURIComponent(t.table_name)}`);
  loading(false);

  // Stat cards
  const sr = document.getElementById("stat-row");
  const freqPills = (t.frequencies || []).map(f => {
    const cls = f === "Monthly" ? "pill-blue" : f === "Annual" ? "pill-green" :
                f === "Quarterly" ? "pill-yellow" : "pill-purple";
    return `<span class="pill ${cls}">${f}</span>`;
  }).join("");
  sr.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Rows</div>
      <div class="stat-value">${t.row_count?.toLocaleString()}</div>
      <div class="stat-sub">${detail.meta.domain}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Date range</div>
      <div class="stat-value" style="font-size:15px">${t.date_min || "—"}</div>
      <div class="stat-sub">to ${t.date_max || "—"}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Frequency</div>
      <div class="stat-value" style="font-size:14px;margin-top:8px">${freqPills || "—"}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Columns</div>
      <div class="stat-value">${(detail.meta.columns || []).length}</div>
      <div class="stat-sub">data columns</div>
    </div>
  `;

  // Column stats table
  const tbody = document.querySelector("#cols-table tbody");
  tbody.innerHTML = (detail.col_stats || []).map((s, i) => {
    const nn      = parseInt(s.non_null || 0, 10);
    const fill    = nn && t.row_count ? Math.round(100 * nn / t.row_count) : 0;
    return `<tr>
      <td class="mono" style="color:var(--muted)">${i + 1}</td>
      <td class="mono">${s.column}</td>
      <td class="mono" style="color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis">${fmt(s.min_val)}</td>
      <td class="mono" style="color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis">${fmt(s.max_val)}</td>
      <td>${nn?.toLocaleString() || 0}</td>
      <td style="min-width:80px">
        ${fill}%
        <div class="null-bar"><div class="null-fill" style="width:${fill}%"></div></div>
      </td>
    </tr>`;
  }).join("");

  // Sample rows
  const sh = document.querySelector("#sample-table thead");
  const sb = document.querySelector("#sample-table tbody");
  const allCols = detail.sample.length ? Object.keys(detail.sample[0]) : [];
  sh.innerHTML = `<tr>${allCols.map(c => `<th>${c}</th>`).join("")}</tr>`;
  sb.innerHTML = (detail.sample || []).map(row =>
    `<tr>${allCols.map(c => `<td>${fmt(row[c])}</td>`).join("")}</tr>`
  ).join("");

  // Chart: load series
  await loadSeries(t.table_name, t.frequencies || []);

  document.getElementById("detail").classList.remove("hidden");
}

async function loadSeries(tableName, frequencies) {
  const freqTabs = document.getElementById("freq-tabs");

  freqTabs.innerHTML = "";
  document.getElementById("type-selector").innerHTML = '<span id="type-selector-label">Type</span>';
  document.getElementById("col-selector").innerHTML  = "";

  if (!frequencies.length) return;

  activeFreq     = frequencies[0];
  activeDataType = null;
  activeCols     = new Set();

  loading(true);
  seriesData = await api(`/api/table/${encodeURIComponent(tableName)}/series?freq=${encodeURIComponent(activeFreq)}`);
  loading(false);

  // Freq tabs
  freqTabs.innerHTML = frequencies.map(f =>
    `<span class="freq-tab${f === activeFreq ? " active" : ""}" data-freq="${f}">${f}</span>`
  ).join("");
  freqTabs.onclick = async e => {
    const tab = e.target.closest(".freq-tab");
    if (!tab) return;
    activeFreq = tab.dataset.freq;
    freqTabs.querySelectorAll(".freq-tab").forEach(t =>
      t.classList.toggle("active", t.dataset.freq === activeFreq)
    );
    loading(true);
    seriesData = await api(`/api/table/${encodeURIComponent(tableName)}/series?freq=${encodeURIComponent(activeFreq)}`);
    loading(false);
    activeDataType = null;
    activeCols = new Set([getFilteredCols()[0]].filter(Boolean));
    renderTypeFilter();
    renderColSelector();
    renderChart();
  };

  activeCols = new Set([getFilteredCols()[0]].filter(Boolean));
  renderTypeFilter();
  renderColSelector();
  renderChart();
}

function getFilteredCols() {
  const cols = seriesData?.cols || [];
  if (!activeDataType) return cols;
  return cols.filter(c => (seriesData.col_types || {})[c] === activeDataType);
}

function renderTypeFilter() {
  const typeSel  = document.getElementById("type-selector");
  const colTypes = seriesData?.col_types || {};
  const present  = TYPE_ORDER.filter(t => Object.values(colTypes).includes(t));
  if (!present.length) {
    typeSel.innerHTML = '<span id="type-selector-label">Type</span>';
    return;
  }

  const buttons = ["all", ...present].map(t => {
    const label  = t === "all" ? "All" : TYPE_LABELS[t];
    const active = (t === "all" && !activeDataType) || t === activeDataType;
    return `<span class="type-btn${active ? " active" : ""}" data-type="${t}">${label}</span>`;
  });
  typeSel.innerHTML = '<span id="type-selector-label">Type</span>' + buttons.join("");

  typeSel.onclick = e => {
    const btn = e.target.closest(".type-btn");
    if (!btn) return;
    activeDataType = btn.dataset.type === "all" ? null : btn.dataset.type;
    typeSel.querySelectorAll(".type-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.type === (activeDataType || "all"))
    );
    activeCols = new Set([getFilteredCols()[0]].filter(Boolean));
    renderColSelector();
    renderChart();
  };
}

function renderColSelector() {
  const colSel   = document.getElementById("col-selector");
  const filtered = getFilteredCols();
  const labels   = seriesData?.col_labels || {};

  if (!filtered.length) {
    colSel.innerHTML = `<span style="color:var(--muted);font-size:12px">No columns of this type</span>`;
    return;
  }

  colSel.innerHTML = filtered.map(c => {
    const label = labels[c] || c;
    const short = label.length > 35 ? label.slice(0, 34) + "…" : label;
    return `<span class="col-btn${activeCols.has(c) ? " active" : ""}" data-col="${c}" title="${label}">${short}</span>`;
  }).join("");

  colSel.onclick = e => {
    const btn = e.target.closest(".col-btn");
    if (!btn) return;
    const c = btn.dataset.col;
    if (activeCols.has(c)) activeCols.delete(c);
    else                   activeCols.add(c);
    colSel.querySelectorAll(".col-btn").forEach(b =>
      b.classList.toggle("active", activeCols.has(b.dataset.col))
    );
    renderChart();
  };
}

function renderChart() {
  const ctx      = document.getElementById("chart");
  const rows     = seriesData?.rows || [];
  const labels   = rows.map(r => r.date?.slice(0, 10) || "");
  const colLabels = seriesData?.col_labels || {};
  const COLORS   = ["#4f8ef7","#f97316","#4ade80","#a78bfa","#fb7185","#38bdf8","#fb923c","#34d399"];

  const datasets = [...activeCols].map((col, i) => {
    const legend = colLabels[col] || col;
    return {
      label:           legend.length > 40 ? legend.slice(0, 39) + "…" : legend,
      data:            rows.map(r => r[col] ?? null),
      borderColor:     COLORS[i % COLORS.length],
      backgroundColor: COLORS[i % COLORS.length] + "22",
      borderWidth:     1.5,
      pointRadius:     rows.length > 120 ? 0 : 2,
      tension:         0.3,
      fill:            false,
    };
  });

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  if (!datasets.length) return;

  // Infer y-axis label from active data type
  const typeUnit = { rm: "RM mn", pct: "%", volume: "Count" };
  const yLabel   = activeDataType ? (typeUnit[activeDataType] || "") : "";

  chartInstance = new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { labels: { color: "#8892a8", font: { size: 11 } } },
        tooltip: { backgroundColor: "#21253a", borderColor: "#2e3250", borderWidth: 1,
                   titleColor: "#e2e8f0", bodyColor: "#8892a8" },
      },
      scales: {
        x: { ticks: { color: "#8892a8", maxTicksLimit: 8, font: { size: 10 } },
             grid: { color: "#2e3250" } },
        y: { ticks: { color: "#8892a8", font: { size: 10 } },
             grid: { color: "#2e3250" },
             title: yLabel ? { display: true, text: yLabel, color: "#8892a8", font: { size: 10 } } : { display: false } },
      },
    },
  });
}

// ── utils ─────────────────────────────────────────────────────────────────
async function api(path) {
  const r = await fetch(path);
  return r.json();
}

function loading(on) {
  document.getElementById("loading").classList.toggle("hidden", !on);
}

function fmt(v) {
  if (v === null || v === undefined) return '<span style="color:var(--muted)">null</span>';
  if (typeof v === "number") return v.toLocaleString(undefined, { maximumFractionDigits: 4 });
  const s = String(v);
  return s.length > 40 ? s.slice(0, 40) + "…" : s;
}
</script>
</body>
</html>
