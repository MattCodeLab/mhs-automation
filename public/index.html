<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BNM MHS Data Browser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── tokens ── */
:root {
  --bg:        #f8fafc;
  --surface:   #ffffff;
  --border:    #e2e8f0;
  --border-md: #cbd5e1;
  --accent:    #2563eb;
  --accent-bg: #eff6ff;
  --text:      #0f172a;
  --text-2:    #334155;
  --muted:     #64748b;
  --muted-2:   #94a3b8;
  --green:     #16a34a;
  --yellow:    #d97706;
  --red:       #dc2626;
  --purple:    #7c3aed;
  --font:      'Inter', system-ui, -apple-system, sans-serif;
  --radius:    6px;
  --shadow:    0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  overflow: hidden;
}

/* ── layout ── */
#app { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }

/* ── sidebar ── */
#sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sidebar-header {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#sidebar-header h1 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}

#sidebar-header p {
  font-size: 11.5px;
  color: var(--muted);
  margin-top: 2px;
}

/* ── search ── */
#search {
  width: 100%;
  padding: 7px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 12.5px;
  font-family: var(--font);
  margin-top: 12px;
  outline: none;
  transition: border-color .15s;
}
#search::placeholder { color: var(--muted-2); }
#search:focus { border-color: var(--accent); }

/* ── domain chips ── */
#domain-filter { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.domain-chip {
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all .12s;
}
.domain-chip:hover { border-color: var(--accent); color: var(--accent); }
.domain-chip.active {
  background: var(--accent-bg);
  border-color: var(--accent);
  color: var(--accent);
}

/* ── table list ── */
#list-count {
  padding: 8px 16px;
  font-size: 11px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

#table-list { overflow-y: auto; flex: 1; }

.table-item {
  padding: 9px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
  border-left: 3px solid transparent;
}
.table-item:hover { background: var(--bg); }
.table-item.active {
  background: var(--accent-bg);
  border-left-color: var(--accent);
}

.ti-id    { font-size: 10.5px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; }
.ti-title {
  font-size: 12.5px;
  color: var(--text-2);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ti-meta  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.ti-err   { color: var(--red); }

/* ── main ── */
#main { display: flex; flex-direction: column; overflow: hidden; }

#main-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
#main-header h2 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
}
#main-header .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }

#main-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* ── stat cards ── */
.stat-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  flex: 1;
  min-width: 110px;
  box-shadow: var(--shadow);
}
.stat-label {
  font-size: 10.5px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  font-weight: 500;
}
.stat-value { font-size: 22px; font-weight: 600; margin-top: 4px; color: var(--text); letter-spacing: -0.02em; }
.stat-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── pills ── */
.pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  margin: 2px;
}
.pill-blue   { background: #dbeafe; color: #1d4ed8; }
.pill-purple { background: #ede9fe; color: #6d28d9; }
.pill-green  { background: #dcfce7; color: #15803d; }
.pill-yellow { background: #fef3c7; color: #b45309; }

/* ── chart panel ── */
#chart-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}

#chart-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; }

#freq-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
.freq-tab {
  padding: 3px 10px;
  border-radius: var(--radius);
  font-size: 11.5px;
  font-weight: 500;
  cursor: pointer;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all .12s;
}
.freq-tab:hover { border-color: var(--accent); color: var(--accent); }
.freq-tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

#type-selector {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 10px;
  align-items: center;
}
#type-selector-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  font-weight: 500;
  margin-right: 2px;
}
.type-btn {
  padding: 2px 9px;
  border-radius: var(--radius);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all .12s;
}
.type-btn:hover { border-color: var(--accent); color: var(--accent); }
.type-btn[data-type="all"].active  { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
.type-btn[data-type="rm"].active   { background: #dcfce7; border-color: #86efac; color: var(--green); }
.type-btn[data-type="pct"].active  { background: #fef3c7; border-color: #fcd34d; color: var(--yellow); }
.type-btn[data-type="volume"].active { background: #ede9fe; border-color: #c4b5fd; color: var(--purple); }
.type-btn[data-type="other"].active  { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

#col-selector { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.col-btn {
  padding: 4px 10px;
  border-radius: var(--radius);
  font-size: 11px;
  cursor: pointer;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all .12s;
  white-space: normal;
  word-break: break-word;
  max-width: 220px;
  line-height: 1.4;
  text-align: left;
}
.col-btn:hover { border-color: var(--accent); color: var(--accent); }
.col-btn.active {
  background: var(--accent-bg);
  border-color: var(--accent);
  color: var(--accent);
}

canvas#chart { width: 100% !important; height: 280px !important; }

/* ── section heading ── */
.section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin: 20px 0 10px;
}

/* ── columns table ── */
table.cols {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
table.cols th {
  text-align: left;
  padding: 8px 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  color: var(--muted);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .05em;
}
table.cols td {
  padding: 7px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  color: var(--text-2);
}
table.cols tr:last-child td { border-bottom: none; }
table.cols tr:hover td { background: var(--bg); }
.mono { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }

.null-bar  { height: 4px; background: var(--border); border-radius: 2px; margin-top: 5px; }
.null-fill { height: 100%; background: var(--accent); border-radius: 2px; }

/* ── sample rows ── */
.sample-scroll { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); }
table.sample {
  min-width: 600px;
  border-collapse: collapse;
  font-size: 11.5px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
}
table.sample th {
  background: var(--bg);
  padding: 7px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--muted);
  white-space: nowrap;
  font-weight: 500;
  font-size: 11px;
  text-align: left;
  text-transform: uppercase;
  letter-spacing: .05em;
}
table.sample td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 11px;
  color: var(--text-2);
}
table.sample tr:last-child td { border-bottom: none; }
table.sample tr:hover td { background: var(--bg); }

/* ── empty / loading ── */
.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--muted-2);
  gap: 12px;
}
.placeholder svg { opacity: .4; }
.placeholder span { font-size: 13px; }

#loading {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  transform-origin: left;
  animation: load .5s ease-in-out infinite alternate;
  z-index: 100;
}
@keyframes load { from { transform: scaleX(.05); } to { transform: scaleX(1); } }
.hidden { display: none !important; }

/* ── scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }
</style>
</head>
<body>
<div id="loading" class="hidden"></div>
<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>BNM Monthly Highlights</h1>
      <p id="db-summary">Loading…</p>
      <input id="search" placeholder="Search tables…" autocomplete="off">
      <div id="domain-filter"></div>
    </div>
    <div id="list-count"></div>
    <div id="table-list"></div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="main-header">
      <h2 id="tbl-name">BNM MHS Data Browser</h2>
      <div class="subtitle" id="tbl-subtitle">Select a table from the sidebar to explore</div>
    </div>
    <div id="main-body">
      <div class="placeholder" id="welcome">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 10h18M3 14h18M10 3v18"/>
        </svg>
        <span>Choose a table from the sidebar</span>
      </div>
      <div id="detail" class="hidden">
        <div class="stat-row" id="stat-row"></div>
        <div id="chart-wrap">
          <div id="chart-title">Time series</div>
          <div id="freq-tabs"></div>
          <div id="type-selector"><span id="type-selector-label">Type</span></div>
          <div id="col-selector"></div>
          <canvas id="chart"></canvas>
        </div>
        <div class="section-title">Columns</div>
        <table class="cols" id="cols-table">
          <thead><tr><th>#</th><th>Column</th><th>Min</th><th>Max</th><th>Non-null</th><th>Fill</th></tr></thead>
          <tbody></tbody>
        </table>
        <div class="section-title" style="margin-top:24px">Sample rows (first 5)</div>
        <div class="sample-scroll">
          <table class="sample" id="sample-table"><thead></thead><tbody></tbody></table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
// ── state ──────────────────────────────────────────────────────────────────
let allTables    = [];
let activeTable  = null;
let chartInstance = null;
let seriesData   = null;
let activeFreq   = null;
let activeCols   = new Set();
let activeDataType = null;
let domainFilter = null;

const TYPE_LABELS = { rm: "RM", pct: "%", volume: "Count", other: "Other" };
const TYPE_ORDER  = ["rm", "pct", "volume", "other"];

// Chart palette — accessible, works on white
const PALETTE = [
  "#2563eb","#16a34a","#d97706","#7c3aed",
  "#0891b2","#dc2626","#059669","#9333ea",
];

// ── boot ───────────────────────────────────────────────────────────────────
(async () => {
  const tables = await api("/api/tables");
  allTables = tables;

  const loaded = tables.filter(t => !t.error);
  const total  = loaded.reduce((s, t) => s + t.row_count, 0);
  document.getElementById("db-summary").textContent =
    `${loaded.length} tables · ${total.toLocaleString()} rows`;

  const domains = [...new Set(tables.map(t => t.domain))].sort();
  const df = document.getElementById("domain-filter");
  df.innerHTML = domains.map(d =>
    `<span class="domain-chip" data-domain="${d}">${d}</span>`
  ).join("");
  df.addEventListener("click", e => {
    const chip = e.target.closest(".domain-chip");
    if (!chip) return;
    const d = chip.dataset.domain;
    domainFilter = domainFilter === d ? null : d;
    df.querySelectorAll(".domain-chip").forEach(c =>
      c.classList.toggle("active", c.dataset.domain === domainFilter)
    );
    renderList();
  });

  renderList();
})();

document.getElementById("search").addEventListener("input", renderList);

// ── sidebar list ──────────────────────────────────────────────────────────
function renderList() {
  const q        = document.getElementById("search").value.toLowerCase();
  const list     = document.getElementById("table-list");
  const filtered = allTables.filter(t => {
    if (domainFilter && t.domain !== domainFilter) return false;
    if (!q) return true;
    return t.table_id.includes(q) || t.title.toLowerCase().includes(q) ||
           t.domain.toLowerCase().includes(q);
  });
  document.getElementById("list-count").textContent =
    `${filtered.length} table${filtered.length !== 1 ? "s" : ""}`;

  list.innerHTML = filtered.map(t => {
    const err   = t.error ? `<span class="ti-err">⚠ ${t.error}</span>` : "";
    const range = t.date_min ? `${t.date_min.slice(0,7)} – ${t.date_max.slice(0,7)}` : "";
    const freqs = (t.frequencies || []).join(", ");
    const active = t.table_name === activeTable?.table_name;
    return `<div class="table-item${active ? " active" : ""}" data-name="${t.table_name}">
      <div class="ti-id">${t.table_id}</div>
      <div class="ti-title" title="${t.title}">${t.title}</div>
      <div class="ti-meta">${err || `${t.row_count?.toLocaleString()} rows · ${range}`}</div>
    </div>`;
  }).join("");

  list.querySelectorAll(".table-item").forEach(el => {
    el.addEventListener("click", () => {
      const t = allTables.find(x => x.table_name === el.dataset.name);
      if (t) openTable(t);
    });
  });
}

// ── table detail ──────────────────────────────────────────────────────────
async function openTable(t) {
  activeTable = t;
  renderList();

  document.getElementById("welcome").classList.add("hidden");
  document.getElementById("detail").classList.add("hidden");
  document.getElementById("tbl-name").textContent = `${t.table_id} — ${t.title}`;
  document.getElementById("tbl-subtitle").textContent =
    `${t.domain} · ${t.row_count?.toLocaleString() || 0} rows`;

  loading(true);
  const detail = await api(`/api/table/${encodeURIComponent(t.table_name)}`);
  loading(false);

  // Stat cards
  const sr = document.getElementById("stat-row");
  const freqPills = (t.frequencies || []).map(f => {
    const cls = f === "Monthly" ? "pill-blue" : f === "Annual" ? "pill-green" :
                f === "Quarterly" ? "pill-yellow" : "pill-purple";
    return `<span class="pill ${cls}">${f}</span>`;
  }).join("");

  sr.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Rows</div>
      <div class="stat-value">${t.row_count?.toLocaleString()}</div>
      <div class="stat-sub">${detail.meta.domain}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Date range</div>
      <div class="stat-value" style="font-size:14px;margin-top:6px">${t.date_min?.slice(0,7) || "—"}</div>
      <div class="stat-sub">to ${t.date_max?.slice(0,7) || "—"}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Frequency</div>
      <div class="stat-value" style="font-size:13px;margin-top:7px">${freqPills || "—"}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Columns</div>
      <div class="stat-value">${(detail.meta.columns || []).length}</div>
      <div class="stat-sub">data columns</div>
    </div>
  `;

  // Column stats
  const tbody = document.querySelector("#cols-table tbody");
  tbody.innerHTML = (detail.col_stats || []).map((s, i) => {
    const nn   = parseInt(s.non_null || 0, 10);
    const fill = nn && t.row_count ? Math.round(100 * nn / t.row_count) : 0;
    return `<tr>
      <td class="mono" style="color:var(--muted)">${i + 1}</td>
      <td class="mono">${s.column}</td>
      <td class="mono" style="color:var(--muted);max-width:110px;overflow:hidden;text-overflow:ellipsis">${fmt(s.min_val)}</td>
      <td class="mono" style="color:var(--muted);max-width:110px;overflow:hidden;text-overflow:ellipsis">${fmt(s.max_val)}</td>
      <td>${nn?.toLocaleString() || 0}</td>
      <td style="min-width:80px">
        <span style="color:var(--text-2)">${fill}%</span>
        <div class="null-bar"><div class="null-fill" style="width:${fill}%"></div></div>
      </td>
    </tr>`;
  }).join("");

  // Sample
  const sh = document.querySelector("#sample-table thead");
  const sb = document.querySelector("#sample-table tbody");
  const allCols = detail.sample.length ? Object.keys(detail.sample[0]) : [];
  sh.innerHTML = `<tr>${allCols.map(c => `<th>${c}</th>`).join("")}</tr>`;
  sb.innerHTML = (detail.sample || []).map(row =>
    `<tr>${allCols.map(c => `<td>${fmt(row[c])}</td>`).join("")}</tr>`
  ).join("");

  await loadSeries(t.table_name, t.frequencies || []);
  document.getElementById("detail").classList.remove("hidden");
}

async function loadSeries(tableName, frequencies) {
  const freqTabs = document.getElementById("freq-tabs");
  freqTabs.innerHTML = "";
  document.getElementById("type-selector").innerHTML = '<span id="type-selector-label">Type</span>';
  document.getElementById("col-selector").innerHTML  = "";
  if (!frequencies.length) return;

  activeFreq     = frequencies[0];
  activeDataType = null;
  activeCols     = new Set();

  loading(true);
  seriesData = await api(`/api/table/${encodeURIComponent(tableName)}/series?freq=${encodeURIComponent(activeFreq)}`);
  loading(false);

  freqTabs.innerHTML = frequencies.map(f =>
    `<span class="freq-tab${f === activeFreq ? " active" : ""}" data-freq="${f}">${f}</span>`
  ).join("");
  freqTabs.onclick = async e => {
    const tab = e.target.closest(".freq-tab");
    if (!tab) return;
    activeFreq = tab.dataset.freq;
    freqTabs.querySelectorAll(".freq-tab").forEach(t =>
      t.classList.toggle("active", t.dataset.freq === activeFreq)
    );
    loading(true);
    seriesData = await api(`/api/table/${encodeURIComponent(tableName)}/series?freq=${encodeURIComponent(activeFreq)}`);
    loading(false);
    activeDataType = null;
    activeCols = new Set([getFilteredCols()[0]].filter(Boolean));
    renderTypeFilter();
    renderColSelector();
    renderChart();
  };

  activeCols = new Set([getFilteredCols()[0]].filter(Boolean));
  renderTypeFilter();
  renderColSelector();
  renderChart();
}

function getFilteredCols() {
  const cols = seriesData?.cols || [];
  if (!activeDataType) return cols;
  return cols.filter(c => (seriesData.col_types || {})[c] === activeDataType);
}

function renderTypeFilter() {
  const typeSel  = document.getElementById("type-selector");
  const colTypes = seriesData?.col_types || {};
  const present  = TYPE_ORDER.filter(t => Object.values(colTypes).includes(t));
  if (!present.length) {
    typeSel.innerHTML = '<span id="type-selector-label">Type</span>';
    return;
  }
  const buttons = ["all", ...present].map(t => {
    const label  = t === "all" ? "All" : TYPE_LABELS[t];
    const active = (t === "all" && !activeDataType) || t === activeDataType;
    return `<span class="type-btn${active ? " active" : ""}" data-type="${t}">${label}</span>`;
  });
  typeSel.innerHTML = '<span id="type-selector-label">Type</span>' + buttons.join("");
  typeSel.onclick = e => {
    const btn = e.target.closest(".type-btn");
    if (!btn) return;
    activeDataType = btn.dataset.type === "all" ? null : btn.dataset.type;
    typeSel.querySelectorAll(".type-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.type === (activeDataType || "all"))
    );
    activeCols = new Set([getFilteredCols()[0]].filter(Boolean));
    renderColSelector();
    renderChart();
  };
}

function renderColSelector() {
  const colSel   = document.getElementById("col-selector");
  const filtered = getFilteredCols();
  const labels   = seriesData?.col_labels || {};
  if (!filtered.length) {
    colSel.innerHTML = `<span style="color:var(--muted);font-size:12px">No columns of this type</span>`;
    return;
  }
  colSel.innerHTML = filtered.map(c => {
    const label = labels[c] || c;
    return `<span class="col-btn${activeCols.has(c) ? " active" : ""}" data-col="${c}">${label}</span>`;
  }).join("");
  colSel.onclick = e => {
    const btn = e.target.closest(".col-btn");
    if (!btn) return;
    const c = btn.dataset.col;
    if (activeCols.has(c)) activeCols.delete(c);
    else                   activeCols.add(c);
    colSel.querySelectorAll(".col-btn").forEach(b =>
      b.classList.toggle("active", activeCols.has(b.dataset.col))
    );
    renderChart();
  };
}

function renderChart() {
  const ctx       = document.getElementById("chart");
  const rows      = seriesData?.rows || [];
  const labels    = rows.map(r => r.date?.slice(0, 10) || "");
  const colLabels = seriesData?.col_labels || {};

  const datasets = [...activeCols].map((col, i) => {
    const legend = colLabels[col] || col;
    const color  = PALETTE[i % PALETTE.length];
    return {
      label:           legend,
      data:            rows.map(r => r[col] ?? null),
      borderColor:     color,
      backgroundColor: color + "18",
      borderWidth:     1.5,
      pointRadius:     rows.length > 120 ? 0 : 2.5,
      pointHoverRadius: 4,
      tension:         0.3,
      fill:            activeCols.size === 1,
    };
  });

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  if (!datasets.length) return;

  const typeUnit = { rm: "RM mn", pct: "%", volume: "Count" };
  const yLabel   = activeDataType ? (typeUnit[activeDataType] || "") : "";

  chartInstance = new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: {
          labels: {
            color: "#64748b",
            font: { family: "'Inter', sans-serif", size: 11 },
            boxWidth: 12,
            padding: 14,
            generateLabels(chart) {
              return Chart.defaults.plugins.legend.labels.generateLabels(chart).map(item => {
                const words = item.text.split(/\s+/);
                const lines = [];
                let line = "";
                for (const word of words) {
                  const test = line ? line + " " + word : word;
                  if (test.length > 32 && line) { lines.push(line); line = word; }
                  else { line = test; }
                }
                if (line) lines.push(line);
                item.text = lines.join("\n");
                return item;
              });
            },
          }
        },
        tooltip: {
          backgroundColor: "#fff",
          borderColor: "#e2e8f0",
          borderWidth: 1,
          titleColor: "#0f172a",
          bodyColor: "#64748b",
          padding: 10,
          titleFont: { family: "'Inter', sans-serif", size: 12, weight: "600" },
          bodyFont:  { family: "'Inter', sans-serif", size: 11 },
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              return v == null ? "" : ` ${ctx.dataset.label}: ${v.toLocaleString(undefined, { maximumFractionDigits: 4 })}`;
            }
          }
        },
      },
      scales: {
        x: {
          ticks: {
            color: "#94a3b8",
            maxTicksLimit: 8,
            font: { family: "'Inter', sans-serif", size: 11 },
          },
          grid: { color: "#f1f5f9" },
          border: { color: "#e2e8f0" },
        },
        y: {
          ticks: {
            color: "#94a3b8",
            font: { family: "'Inter', sans-serif", size: 11 },
          },
          grid: { color: "#f1f5f9" },
          border: { color: "#e2e8f0" },
          title: yLabel
            ? { display: true, text: yLabel, color: "#94a3b8", font: { family: "'Inter', sans-serif", size: 11 } }
            : { display: false },
        },
      },
    },
  });
}

// ── utils ─────────────────────────────────────────────────────────────────
async function api(path) {
  const r = await fetch(path);
  return r.json();
}

function loading(on) {
  document.getElementById("loading").classList.toggle("hidden", !on);
}

function fmt(v) {
  if (v === null || v === undefined)
    return `<span style="color:var(--muted-2)">—</span>`;
  if (typeof v === "number")
    return v.toLocaleString(undefined, { maximumFractionDigits: 4 });
  const s = String(v);
  return s.length > 42 ? s.slice(0, 42) + "…" : s;
}

function inferDataType(col) {
  const n = col.toLowerCase().replace(/[^a-z0-9]+/g, "_");
  if (/^no_of|_no_of|number_of|_count$|^count_|^volume|_volume$|transactions?$|polic|certif|cases_|cleared|returned/.test(n))
    return "volume";
  if (/ratio_|_ratio$|growth$|_rate$|^rate_|yield|coverage|adequacy|retention|_pct$|claims_ratio|weighted/.test(n))
    return "pct";
  return "rm";
}
